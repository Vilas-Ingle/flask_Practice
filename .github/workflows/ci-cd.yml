name: Flask CI/CD pipeline
on:
  push:
    branches:
      -main
      -staging

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      -name: Checkout Repository
      uses: actions/Checkout@v4

      -name: Setup Python
      uses: actions/setup-python@v5
      with:
          python-version: "3.12"

      -name: Verify Python
      run: python --version


    